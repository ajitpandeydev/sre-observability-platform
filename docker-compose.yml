version: '3.8'

services:
  order-service:
    build: ./services/order_service
    ports:
      - "5000:5000"
      - "8001:8001"

  user-service:
    build: ./services/user_service
    ports:
      - "5001:5001"
      - "8000:8000"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"